<div class="card shadow-sm border-0 border-top border-success border-4 text-center p-3 bg-white">
    <div class="card-body px-0 py-1">
        <h6 class="fw-bold text-dark mb-3 lh-base text-center" style="font-size: 13px;">
            <div class="d-flex align-items-center gap-3 mb-3">
                {% if config.service_image %}
                <div class="shadow-sm rounded overflow-hidden bg-white"
                     style="width: 80px; height: 80px; flex-shrink: 0;">
                    <img src="{{ config.service_image.url }}" alt="Đồ án" class="w-100 h-100"
                         style="object-fit: contain; padding: 2px;">
                </div>
                {% endif %}

                <div class="d-flex align-items-center gap-3 mb-3">
                    <div class="d-flex flex-column justify-content-center text-center w-100 py-2">
                        <span class="fw-bold text-uppercase"
                              style="font-size: 13px; letter-spacing: 1px;">NHẬN</span>
                        <span class="fw-bold text-uppercase" style="color: #dc3545; font-size: 14px; line-height: 1.4;">THIẾT KẾ & TRIỂN KHAI</span>
                        <span class="fw-bold text-uppercase" style="color: #198754; font-size: 14px; line-height: 1.4;">ĐỒ ÁN – DỰ ÁN</span>
                    </div>
                </div>
            </div>
        </h6>

        {% if config.service_video %}
        <div class="mt-3 rounded overflow-hidden shadow-sm">
            <!-- Thêm autoplay, muted, loop, playsinline vào thẻ video -->
            <video width="100%" controls autoplay muted loop playsinline class="d-block">
                <source src="{{ config.service_video.url }}" type="video/mp4">
                Trình duyệt của bạn không hỗ trợ phát video này.
            </video>
        </div>
        {% endif %}

        <div id="vung-lien-he" class="mt-2 pt-2 border-top text-start">
            <div class="p-2 bg-light rounded border">
                <div class="mb-2 text-center">
                    <span class="text-secondary d-block" style="font-size: 11px;">Hotline:</span>
                    <strong class="text-dark" style="font-size: 14px;">
                        <i class="bi bi-telephone-fill text-success me-1"></i> {{ config.phone }}
                    </strong>
                </div>
                <div class="d-grid gap-2">
                    <button type="button" onclick="moAppZalo()" class="btn btn-success btn-sm fw-bold">
                        <i class="bi bi-chat-left-text-fill me-1"></i> CHAT ZALO
                    </button>
                    <a href="{{ config.messenger_url }}" target="_blank" class="btn btn-primary btn-sm fw-bold"
                       style="background-color: #0084FF;">
                        <i class="bi bi-messenger me-1"></i> CHAT MESSENGER
                    </a>
                    <a href="{% url 'shop:lien_he' %}" class="btn btn-secondary btn-sm fw-bold">
                        <i class="bi bi-geo-alt-fill me-1"></i> XEM BẢN ĐỒ
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    if (typeof moAppZalo !== 'function') {
        function moAppZalo() {
            var sdtZalo = "{{ config.zalo_phone }}";
            window.location.href = "zalo://conversation?phone=" + sdtZalo;
        }
    }
</script>
