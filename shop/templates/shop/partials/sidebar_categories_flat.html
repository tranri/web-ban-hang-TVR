<div class="card shadow-sm border-0 rounded overflow-hidden sidebar-menu">
    <div class="sidebar-heading"><i class="bi bi-list-task"></i> DANH MỤC THIẾT BỊ</div>
    <div class="list-group list-group-flush">
        {% for cat in categories %}
            <a href="/?category={{ cat.slug }}" class="list-group-item list-group-item-action d-flex align-items-center py-2 px-3" style="font-size: 13px;">
                <i class="bi bi-tag-fill text-success me-2"></i> {{ cat.name }}
            </a>
        {% empty %}
            <small class="text-muted p-3">Chưa có danh mục nào</small>
        {% endfor %}
    </div>
</div>
