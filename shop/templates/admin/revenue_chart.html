{% extends "admin/base_site.html" %}
{% load i18n %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container" style="max-width:900px;">
    <h1 style="margin-bottom:0.6em;">{{ title }}</h1>

    <form method="get" style="margin-bottom:0.6em;">
        <label for="days">Range:</label>
        <select name="days" id="days" onchange="this.form.submit()">
            <option value="7" {% if days== 7 %}selected{% endif %}>7 days</option>
            <option value="30" {% if days== 30 %}selected{% endif %}>30 days</option>
            <option value="90" {% if days== 90 %}selected{% endif %}>90 days</option>
            <option value="365" {% if days== 365 %}selected{% endif %}>12 months</option>
        </select>
        <noscript>
            <button type="submit">Apply</button>
        </noscript>
    </form>

    <canvas id="revenueChart" width="800" height="320"
            style="background:#fff;border:1px solid #eee;padding:10px;"></canvas>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const labels = {{ labels_json|safe }};
        const data = {{ data_json|safe }};

        const ctx = document.getElementById('revenueChart').getContext('2d');
        const revenueChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: 'Revenue (VND)',
              data: data,
              borderColor: '#3e95cd',
              backgroundColor: 'rgba(62,149,205,0.15)',
              fill: true,
              tension: 0.25,
              pointRadius: 3,
            }]
          },
          options: {
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  callback: function(value, index, values) {
                    return value.toLocaleString('vi-VN') + 'đ';
                  }
                }
              }
            },
            plugins: {
              tooltip: {
                callbacks: {
                  label: function(context) {
                    let v = context.parsed.y || 0;
                    return v.toLocaleString('vi-VN') + 'đ';
                  }
                }
              }
            },
            responsive: true,
            maintainAspectRatio: false
          }
        });

        // Scroll chart into view after reload when ?days= is present or hash #revenue
        document.addEventListener('DOMContentLoaded', function () {
            if (window.location.hash === '#revenue' || new URLSearchParams(window.location.search).has('days')) {
                const el = document.getElementById('revenueChart');
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });
    </script>
</div>
{% endblock %}
